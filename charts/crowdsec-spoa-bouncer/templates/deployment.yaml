apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "crowdsec-spoa-bouncer.fullname" . }}
  labels:
    {{- include "crowdsec-spoa-bouncer.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.bouncer.replicaCount }}
  {{- with .Values.bouncer.strategy }}
  strategy:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "crowdsec-spoa-bouncer.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- if or (include "crowdsec-spoa-bouncer.hasConfig" .) .Values.bouncer.podAnnotations }}
      annotations:
        {{- if include "crowdsec-spoa-bouncer.hasConfig" . }}
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- end }}
        {{- with .Values.bouncer.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}
      labels:
        {{- include "crowdsec-spoa-bouncer.selectorLabels" . | nindent 8 }}
        {{- with .Values.bouncer.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.bouncer.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.bouncer.priorityClassName }}
      priorityClassName: {{ . }}
      {{- end }}
      initContainers:
        - name: wait-for-lapi
          image: "{{ .Values.bouncer.waitForLapi.image.repository }}:{{ .Values.bouncer.waitForLapi.image.tag }}"
          imagePullPolicy: {{ .Values.bouncer.waitForLapi.image.pullPolicy }}
          command: ['sh', '-c', 'until [ "$(curl -s -o /dev/null -w "%{http_code}" -H "X-Api-Key: $API_KEY" "http://$LAPI_HOST:$LAPI_PORT/v1/decisions/stream?startup=true")" = "200" ]; do echo "waiting for lapi and valid api key"; sleep 5; done; echo "lapi is up and api key is valid"']
          env:
            - name: LAPI_HOST
              value: {{ include "crowdsec-spoa-bouncer.lapiHost" . | quote }}
            - name: LAPI_PORT
              value: {{ include "crowdsec-spoa-bouncer.lapiPort" . | quote }}
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "crowdsec-spoa-bouncer.secretName" . }}
                  key: {{ include "crowdsec-spoa-bouncer.secretKey" . }}
          resources:
            limits:
              memory: 50Mi
            requests:
              cpu: 1m
              memory: 10Mi
          {{- with .Values.bouncer.waitForLapi.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.bouncer.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          env:
            - name: CROWDSEC_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "crowdsec-spoa-bouncer.secretName" . }}
                  key: {{ include "crowdsec-spoa-bouncer.secretKey" . }}
            - name: CROWDSEC_URL
              value: {{ include "crowdsec-spoa-bouncer.lapiURL" . | quote }}
            - name: LISTEN_TCP
              value: "0.0.0.0:{{ .Values.bouncer.spoa.port }}"
            {{- if .Values.bouncer.metrics.enabled }}
            - name: PROMETHEUS_ENABLED
              value: "true"
            - name: PROMETHEUS_ADDR
              value: "0.0.0.0"
            - name: PROMETHEUS_PORT
              value: {{ .Values.bouncer.spoa.metricsPort | quote }}
            {{- else }}
            - name: PROMETHEUS_ENABLED
              value: "false"
            {{- end }}
            {{- with .Values.bouncer.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.bouncer.envFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: spoa
              containerPort: {{ .Values.bouncer.spoa.port }}
              protocol: TCP
            {{- if .Values.bouncer.metrics.enabled }}
            - name: metrics
              containerPort: {{ .Values.bouncer.spoa.metricsPort }}
              protocol: TCP
            {{- end }}
          livenessProbe:
            tcpSocket:
              port: spoa
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: spoa
            initialDelaySeconds: 5
            periodSeconds: 10
          {{- with .Values.bouncer.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if or (include "crowdsec-spoa-bouncer.hasConfig" .) .Values.bouncer.extraVolumeMounts }}
          volumeMounts:
            {{- if include "crowdsec-spoa-bouncer.hasConfig" . }}
            - name: config
              mountPath: /etc/crowdsec/bouncers/crowdsec-spoa-bouncer.yaml.local
              subPath: crowdsec-spoa-bouncer.yaml.local
              readOnly: true
            {{- end }}
            {{- with .Values.bouncer.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- end }}
      {{- if or (include "crowdsec-spoa-bouncer.hasConfig" .) .Values.bouncer.extraVolumes }}
      volumes:
        {{- if include "crowdsec-spoa-bouncer.hasConfig" . }}
        - name: config
          configMap:
            name: {{ include "crowdsec-spoa-bouncer.fullname" . }}-config
        {{- end }}
        {{- with .Values.bouncer.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}
      {{- with .Values.bouncer.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.bouncer.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.bouncer.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
